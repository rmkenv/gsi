name: GSI Nightly ETL

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  etl:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit output JSON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy pandas

      - name: Run GSI ETL
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python etl.py

      - name: Commit updated GSI data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: nightly GSI update $(date -u +%Y-%m-%d)"
          git push
