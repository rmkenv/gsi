<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Stress Index — IQSpatial</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 20px; font-weight: 700; color: #58a6ff; letter-spacing: -0.5px; }
    .header-sub  { font-size: 12px; color: #8b949e; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #last-updated { font-size: 11px; color: #8b949e; }

    .badge {
      font-size: 10px; font-weight: 600; padding: 3px 8px;
      border-radius: 12px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .badge-critical { background: #7f1d1d; color: #fca5a5; }
    .badge-high     { background: #7c2d12; color: #fdba74; }
    .badge-moderate { background: #713f12; color: #fde047; }
    .badge-low      { background: #14532d; color: #86efac; }

    .main { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 340px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .sidebar-header h2 { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }

    .grid-list { overflow-y: auto; flex: 1; }
    .grid-item {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .grid-item:hover { background: #1f2937; }
    .grid-item.active { background: #1f2937; border-left: 3px solid #58a6ff; }
    .grid-item-left { flex: 1; }
    .grid-item-name { font-size: 13px; font-weight: 600; color: #e6edf3; }
    .grid-item-region { font-size: 11px; color: #8b949e; margin-top: 2px; }
    .grid-item-right { display: flex; align-items: center; gap: 8px; }
    .gsi-chip {
      font-size: 12px; font-weight: 700;
      width: 42px; text-align: center;
      padding: 3px 0; border-radius: 4px;
    }

    .zone-panel {
      padding: 14px 16px;
      border-top: 1px solid #30363d;
      flex-shrink: 0;
      max-height: 52vh;
      overflow-y: auto;
    }
    .zone-panel h3 {
      font-size: 12px; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .zone-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .zone-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .zone-name { font-size: 12px; font-weight: 600; }
    .zone-sub  { font-size: 10px; color: #8b949e; margin-top: 1px; }

    .metric-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .metric {
      flex: 1; min-width: 70px;
      background: #161b22;
      border-radius: 4px;
      padding: 4px 8px;
    }
    .metric-label { font-size: 9px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.3px; }
    .metric-value { font-size: 12px; font-weight: 600; margin-top: 1px; }

    .comp-bars { margin-top: 8px; }
    .comp-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .comp-bar-label { font-size: 9px; color: #8b949e; width: 65px; flex-shrink: 0; }
    .comp-bar-track { flex: 1; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
    .comp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .comp-bar-val { font-size: 9px; color: #8b949e; width: 28px; text-align: right; }

    #map { flex: 1; z-index: 0; }

    .scoreboard {
      position: absolute;
      bottom: 20px; right: 20px;
      background: rgba(22,27,34,0.95);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      z-index: 999;
      min-width: 200px;
      backdrop-filter: blur(4px);
    }
    .scoreboard h4 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 11px; }
    .score-row-name { color: #e6edf3; }
    .score-row-val  { font-weight: 700; }

    .leaflet-container { background: #0d1117; }
    .leaflet-popup-content-wrapper {
      background: #161b22 !important;
      border: 1px solid #30363d !important;
      border-radius: 8px !important;
      color: #e6edf3 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: #161b22 !important; }
    .leaflet-popup-content { margin: 10px 14px !important; }
    .popup-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .popup-row   { font-size: 11px; margin-bottom: 3px; color: #8b949e; }
    .popup-row span { color: #e6edf3; font-weight: 600; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #8b949e; font-size: 14px; }
  </style>
</head>

</div>

function levelColor(level) {
  const c = { CRITICAL:'#ef4444', HIGH:'#f97316', MODERATE:'#eab308', LOW:'#22c55e' };
  return c[level] || '#6b7280';
}
function badgeClass(level) {
  const c = { CRITICAL:'badge-critical', HIGH:'badge-high', MODERATE:'badge-moderate', LOW:'badge-low' };
  return c[level] || 'badge-low';
}
function gsiChipStyle(level) {
  const bg = { CRITICAL:'rgba(127,29,29,0.8)', HIGH:'rgba(124,45,18,0.8)', MODERATE:'rgba(113,63,18,0.8)', LOW:'rgba(20,83,45,0.8)' };
  const fg = { CRITICAL:'#fca5a5', HIGH:'#fdba74', MODERATE:'#fde047', LOW:'#86efac' };
  return `background:${bg[level]||'#374151'};color:${fg[level]||'#9ca3af'}`;
}
function compBarColor(key) {
  const c = { temp_anomaly:'#f97316', uhi:'#ef4444', reserve_margin:'#3b82f6', renew_shortfall:'#22c55e' };
  return c[key] || '#6b7280';
}

async function loadData() {
  // Try fetch first — picks up nightly ETL updates
  const paths = ['/data/gsi_latest.json', './data/gsi_latest.json'];
  for (const path of paths) {
    try {
      const r = await fetch(path + '?t=' + Date.now());
      if (!r.ok) continue;
      const text = await r.text();
      if (text.includes('NaN')) throw new Error('Invalid JSON: contains NaN');
      gsiData = JSON.parse(text);
      renderAll();
      return;
    } catch(e) {
      console.warn('fetch failed for', path, e.message);
    }
  }
  // Fallback to embedded seed data — always works
  console.log('Using embedded seed data');
  gsiData = SEED_DATA;
  renderAll();
}

loadData();
