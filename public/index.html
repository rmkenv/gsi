<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Stress Index</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 20px; font-weight: 700; color: #58a6ff; letter-spacing: -0.5px; }
    .header-sub  { font-size: 12px; color: #8b949e; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #last-updated { font-size: 11px; color: #8b949e; }

    .badge {
      font-size: 10px; font-weight: 600; padding: 3px 8px;
      border-radius: 12px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .badge-critical { background: #7f1d1d; color: #fca5a5; }
    .badge-high     { background: #7c2d12; color: #fdba74; }
    .badge-moderate { background: #713f12; color: #fde047; }
    .badge-low      { background: #14532d; color: #86efac; }

    .main { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 340px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .sidebar-header h2 { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }

    .grid-list { overflow-y: auto; flex: 1; }
    .grid-item {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .grid-item:hover { background: #1f2937; }
    .grid-item.active { background: #1f2937; border-left: 3px solid #58a6ff; }
    .grid-item-left { flex: 1; }
    .grid-item-name { font-size: 13px; font-weight: 600; color: #e6edf3; }
    .grid-item-region { font-size: 11px; color: #8b949e; margin-top: 2px; }
    .grid-item-right { display: flex; align-items: center; gap: 8px; }
    .gsi-chip {
      font-size: 12px; font-weight: 700;
      width: 42px; text-align: center;
      padding: 3px 0; border-radius: 4px;
    }

    .zone-panel {
      padding: 14px 16px;
      border-top: 1px solid #30363d;
      flex-shrink: 0;
      max-height: 52vh;
      overflow-y: auto;
    }
    .zone-panel h3 {
      font-size: 12px; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .zone-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .zone-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .zone-name { font-size: 12px; font-weight: 600; }
    .zone-sub  { font-size: 10px; color: #8b949e; margin-top: 1px; }

    .metric-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .metric {
      flex: 1; min-width: 70px;
      background: #161b22;
      border-radius: 4px;
      padding: 4px 8px;
    }
    .metric-label { font-size: 9px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.3px; }
    .metric-value { font-size: 12px; font-weight: 600; margin-top: 1px; }

    .comp-bars { margin-top: 8px; }
    .comp-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .comp-bar-label { font-size: 9px; color: #8b949e; width: 65px; flex-shrink: 0; }
    .comp-bar-track { flex: 1; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
    .comp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .comp-bar-val { font-size: 9px; color: #8b949e; width: 28px; text-align: right; }

    #map { flex: 1; z-index: 0; }

    .scoreboard {
      position: absolute;
      bottom: 20px; right: 20px;
      background: rgba(22,27,34,0.95);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      z-index: 999;
      min-width: 200px;
      backdrop-filter: blur(4px);
    }
    .scoreboard h4 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 11px; }
    .score-row-name { color: #e6edf3; }
    .score-row-val  { font-weight: 700; }

    .leaflet-container { background: #0d1117; }
    .leaflet-popup-content-wrapper {
      background: #161b22 !important;
      border: 1px solid #30363d !important;
      border-radius: 8px !important;
      color: #e6edf3 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: #161b22 !important; }
    .leaflet-popup-content { margin: 10px 14px !important; }
    .popup-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .popup-row   { font-size: 11px; margin-bottom: 3px; color: #8b949e; }
    .popup-row span { color: #e6edf3; font-weight: 600; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #8b949e; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-logo">⚡ Grid Stress Index</div>
      <div class="header-sub">IQSpatial · Composite satellite + weather + grid signal</div>
    </div>
  </div>
  <div class="header-right">
    <div id="last-updated">Loading...</div>
    <a href="https://github.com/rmkenv" target="_blank"
       style="font-size:11px;color:#58a6ff;text-decoration:none;">github.com/rmkenv</a>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>US Grid Operators — 7-day GSI Forecast</h2>
    </div>
    <div class="grid-list" id="grid-list">
      <div class="loading">Loading grid data...</div>
    </div>
    <div class="zone-panel" id="zone-panel" style="display:none;">
      <h3 id="zone-panel-title">Zones</h3>
      <div id="zone-cards"></div>
    </div>
  </div>

  <div style="flex:1;position:relative;">
    <div id="map"></div>
    <div class="scoreboard" id="scoreboard" style="display:none;">
      <h4>🔴 Highest Stress Zones</h4>
      <div id="scoreboard-rows"></div>
    </div>
  </div>
</div>

<script>
const map = L.map('map', {
  center: [38.5, -96.0],
  zoom: 4,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

let gsiData    = null;
let activeGrid = null;
let zoneMarkers = {};

function levelColor(level) {
  const c = { CRITICAL:'#ef4444', HIGH:'#f97316', MODERATE:'#eab308', LOW:'#22c55e' };
  return c[level] || '#6b7280';
}
function badgeClass(level) {
  const c = { CRITICAL:'badge-critical', HIGH:'badge-high', MODERATE:'badge-moderate', LOW:'badge-low' };
  return c[level] || 'badge-low';
}
function gsiChipStyle(level) {
  const bg = { CRITICAL:'rgba(127,29,29,0.8)', HIGH:'rgba(124,45,18,0.8)', MODERATE:'rgba(113,63,18,0.8)', LOW:'rgba(20,83,45,0.8)' };
  const fg = { CRITICAL:'#fca5a5', HIGH:'#fdba74', MODERATE:'#fde047', LOW:'#86efac' };
  return `background:${bg[level]||'#374151'};color:${fg[level]||'#9ca3af'}`;
}
function compBarColor(key) {
  const c = { temp_anomaly:'#f97316', uhi:'#ef4444', reserve_margin:'#3b82f6', renew_shortfall:'#22c55e' };
  return c[key] || '#6b7280';
}

// ── FIXED: absolute path with leading slash ──────────────────────────────────
async function loadData() {
  const paths = [
    '/data/gsi_latest.json',          // absolute — works on Vercel
    './data/gsi_latest.json',         // relative fallback
    'data/gsi_latest.json'            // bare fallback
  ];

  for (const path of paths) {
    try {
      const r = await fetch(path + '?t=' + Date.now());
      if (!r.ok) continue;
      gsiData = await r.json();
      renderAll();
      return;
    } catch(e) {
      continue;
    }
  }

  // All paths failed
  document.getElementById('grid-list').innerHTML =
    `<div class="loading" style="flex-direction:column;gap:8px;padding:20px;text-align:center;">
      <div>⚠️ Failed to load GSI data</div>
      <div style="font-size:11px;color:#6b7280;">
        Commit public/data/gsi_latest.json to your repo,<br>
        or run the GitHub Actions workflow manually.
      </div>
    </div>`;
}

function renderAll() {
  if (!gsiData) return;
  const ts = new Date(gsiData.generated_at);
  document.getElementById('last-updated').textContent =
    'Updated: ' + ts.toUTCString().replace(' GMT','');
  renderGridList();
  renderMapMarkers();
  renderScoreboard();
}

function renderGridList() {
  const grids = Object.values(gsiData.grids).sort((a,b) => b.gsi_mean - a.gsi_mean);
  const html = grids.map(g => `
    <div class="grid-item" onclick="selectGrid('${g.eia_code}')" id="gi-${g.eia_code}">
      <div class="grid-item-left">
        <div class="grid-item-name">${g.label}</div>
        <div class="grid-item-region">${g.region}</div>
      </div>
      <div class="grid-item-right">
        <div class="gsi-chip" style="${gsiChipStyle(g.level)}">${g.gsi_mean.toFixed(2)}</div>
        <span class="badge ${badgeClass(g.level)}">${g.level}</span>
      </div>
    </div>
  `).join('');
  document.getElementById('grid-list').innerHTML = html;
}

function renderMapMarkers() {
  Object.values(gsiData.grids).forEach(grid => {
    Object.entries(grid.zones).forEach(([zoneName, zone]) => {
      if (!zone.lat || !zone.lon) return;

      const gsi    = zone.gsi_forecast || 0;
      const level  = zone.level_fore   || 'LOW';
      const color  = levelColor(level);
      const radius = 8 + gsi * 16;

      const marker = L.circleMarker([zone.lat, zone.lon], {
        radius,
        fillColor:   color,
        color:       '#ffffff',
        weight:      1,
        fillOpacity: 0.75,
        opacity:     0.6
      });

      const raw  = zone.raw  || {};
      const comp = zone.components || {};

      const tempStr = raw.temp_anomaly_c !== undefined
        ? (raw.temp_anomaly_c > 0 ? '+' : '') + raw.temp_anomaly_c + '°C'
        : '-';

      marker.bindPopup(`
        <div class="popup-title">⚡ ${grid.label} — ${zoneName}</div>
        <div class="popup-row">Zone: <span>${zone.grid_zone || '-'}</span></div>
        <div class="popup-row">GSI Forecast: <span style="color:${color}">${gsi.toFixed(3)} ${level}</span></div>
        <div class="popup-row">GSI Historical (2023): <span>${(zone.gsi_historical||0).toFixed(3)}</span></div>
        <hr style="border-color:#30363d;margin:6px 0">
        <div class="popup-row">Temp anomaly: <span>${tempStr}</span></div>
        <div class="popup-row">UHI intensity: <span>${raw.uhi_intensity_c || '-'}°C</span></div>
        <div class="popup-row">Current temp: <span>${raw.current_temp_c || '-'}°C</span></div>
        <div class="popup-row">7-day max: <span>${raw.forecast_max_c || '-'}°C</span></div>
      `, { maxWidth: 240 });

      marker.on('click', () => {
        selectGrid(grid.eia_code);
        map.panTo([zone.lat, zone.lon], { animate: true });
      });

      marker.addTo(map);
      zoneMarkers[`${grid.eia_code}-${zoneName}`] = marker;
    });
  });
}

function selectGrid(eiaCode) {
  if (activeGrid) {
    const prev = document.getElementById(`gi-${activeGrid}`);
    if (prev) prev.classList.remove('active');
  }
  activeGrid = eiaCode;

  const el = document.getElementById(`gi-${eiaCode}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  const grid = gsiData.grids[eiaCode];
  if (!grid) return;

  map.flyTo(grid.map_center, 6, { animate: true, duration: 0.8 });
  renderZonePanel(grid);
}

function renderZonePanel(grid) {
  document.getElementById('zone-panel').style.display = 'block';
  document.getElementById('zone-panel-title').textContent = grid.label + ' — Zones';

  const compLabels = {
    temp_anomaly: 'Temp Anom', uhi: 'UHI',
    reserve_margin: 'Reserve', renew_shortfall: 'Renew'
  };

  const zones = Object.entries(grid.zones)
    .filter(([,z]) => !z.error)
    .sort(([,a],[,b]) => (b.gsi_forecast||0) - (a.gsi_forecast||0));

  const html = zones.map(([name, zone]) => {
    const comp = zone.components || {};
    const raw  = zone.raw || {};
    const tempColor = (raw.temp_anomaly_c > 2) ? '#f97316' : '#e6edf3';
    const uhiColor  = (raw.uhi_intensity_c > 10) ? '#ef4444' : '#e6edf3';
    const tempStr   = raw.temp_anomaly_c !== undefined
      ? (raw.temp_anomaly_c > 0 ? '+' : '') + raw.temp_anomaly_c + '°C' : '-';

    const compBars = Object.entries(comp).map(([k,v]) => `
      <div class="comp-bar-row">
        <div class="comp-bar-label">${compLabels[k]||k}</div>
        <div class="comp-bar-track">
          <div class="comp-bar-fill" style="width:${Math.round(v*100)}%;background:${compBarColor(k)}"></div>
        </div>
        <div class="comp-bar-val">${v.toFixed(2)}</div>
      </div>`).join('');

    return `
      <div class="zone-card">
        <div class="zone-card-header">
          <div>
            <div class="zone-name">${name}</div>
            <div class="zone-sub">${zone.grid_zone || ''}</div>
          </div>
          <span class="badge ${badgeClass(zone.level_fore)}">${(zone.gsi_forecast||0).toFixed(3)}</span>
        </div>
        <div class="metric-row">
          <div class="metric">
            <div class="metric-label">Temp Δ</div>
            <div class="metric-value" style="color:${tempColor}">${tempStr}</div>
          </div>
          <div class="metric">
            <div class="metric-label">UHI</div>
            <div class="metric-value" style="color:${uhiColor}">${raw.uhi_intensity_c || '-'}°C</div>
          </div>
          <div class="metric">
            <div class="metric-label">7d Max</div>
            <div class="metric-value">${raw.forecast_max_c || '-'}°C</div>
          </div>
          <div class="metric">
            <div class="metric-label">Now</div>
            <div class="metric-value">${raw.current_temp_c || '-'}°C</div>
          </div>
        </div>
        <div class="comp-bars">${compBars}</div>
      </div>`;
  }).join('');

  document.getElementById('zone-cards').innerHTML = html;
}

function renderScoreboard() {
  const allZones = [];
  Object.values(gsiData.grids).forEach(grid => {
    Object.entries(grid.zones).forEach(([name, zone]) => {
      if (zone.gsi_forecast !== undefined) {
        allZones.push({
          name, grid: grid.label,
          gsi: zone.gsi_forecast,
          level: zone.level_fore,
          color: levelColor(zone.level_fore)
        });
      }
    });
  });

  const top5 = allZones.sort((a,b) => b.gsi - a.gsi).slice(0, 5);
  const html = top5.map((z,i) => `
    <div class="score-row">
      <div class="score-row-name">${i+1}. ${z.name} <span style="color:#8b949e;font-size:10px">(${z.grid})</span></div>
      <div class="score-row-val" style="color:${z.color}">${z.gsi.toFixed(3)}</div>
    </div>`).join('');

  document.getElementById('scoreboard-rows').innerHTML = html;
  document.getElementById('scoreboard').style.display = 'block';
}

loadData();
</script>

</body>
</html>
